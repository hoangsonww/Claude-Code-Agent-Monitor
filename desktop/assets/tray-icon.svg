    <polygon points="11,1.5 19,5.7 19,16.3 11,20.5 3,16.3 3,5.7"/>
    <circle cx="11" cy="11" r="2" fill="black" stroke="none"/>
    <line x1="11" y1="9"   x2="11" y2="5.5"/>
    <line x1="12.8" y1="12" x2="16" y2="13.8"/>
    <line x1="9.2"  y1="12" x2="6"  y2="13.8"/>
    <circle cx="11" cy="4.8"  r="1.1" fill="black" stroke="none"/>
    <circle cx="16.3" cy="14.5" r="1.1" fill="black" stroke="none"/>
    <circle cx="5.7"  cy="14.5" r="1.1" fill="black" stroke="none"/>
  </g>
</svg>
