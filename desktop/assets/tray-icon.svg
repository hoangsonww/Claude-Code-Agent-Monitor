<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!--
    macOS menu-bar (tray) glyph. Single-color black on transparent; the OS
    auto-tints this for light and dark menu bars when the file name ends in
    "Template.png" and `setTemplateImage(true)` is called.
  -->
